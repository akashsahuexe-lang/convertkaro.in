<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Case Converter & Word Counter — Convertkaro.in</title>
<meta name="description" content="Convert text to UPPERCASE, lowercase, Title Case. Includes live word and character counter.">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<style>
/* ── BASIC SETUP ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
:root { --bg: #f8f7f4; --white: #ffffff; --red: #e02b20; --red-hover: #c4231a; --red-light: rgba(224,43,32,0.07); --ink: #141414; --ink-2: #3d3d3d; --ink-3: #888; --border: #e4e2dc; --success: #2d8a4e; }
body { background: var(--bg); color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

/* Nav & Breadcrumb */
nav { position:fixed; top:0; left:0; right:0; z-index:100; height:68px; display:flex; align-items:center; justify-content:space-between; padding:0 48px; background:rgba(248,247,244,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
.logo { display:flex; align-items:center; gap:9px; text-decoration:none; } .logo-mark img { width:32px; height:32px; object-fit:cover; border-radius:8px; }
.logo-name { font-size:17px; font-weight:700; color:var(--ink); } .logo-name span { color:var(--red); }
.nav-links { display:flex; gap:32px; list-style:none; } .nav-links a { font-size:14px; font-weight:500; color:var(--ink-3); text-decoration:none; }
.breadcrumb { padding:88px 48px 0; font-size:13px; color:var(--ink-3); } .breadcrumb a { color:var(--ink-3); text-decoration:none; }

/* Hero */
.page-hero { padding:32px 48px 40px; display:flex; align-items:center; gap:20px; }
.tool-icon-big { width:64px; height:64px; border-radius:18px; background:var(--red-light); border:1.5px solid rgba(224,43,32,0.2); display:grid; place-items:center; font-size:30px; }
.page-title { font-size:clamp(26px,4vw,38px); font-weight:800; color:var(--ink); margin-bottom:6px; } .page-title .serif { font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; color:var(--red); }
.page-sub { font-size:15px; color:var(--ink-3); }

.main { padding:0 48px 80px; max-width: 1000px; margin: 0 auto; } 

/* Stats Bar */
.stats-bar { display:flex; gap:16px; margin-bottom:16px; }
.stat-box { background:var(--white); border:1.5px solid var(--border); border-radius:12px; padding:16px 24px; display:flex; flex-direction:column; min-width:120px; }
.stat-num { font-size:24px; font-weight:800; color:var(--red); }
.stat-label { font-size:12px; font-weight:600; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.05em; margin-top:4px; }

/* Main Editor */
.editor-panel { background:var(--white); border:1.5px solid var(--border); border-radius:20px; overflow:hidden; display:flex; flex-direction:column; }
.text-area { width:100%; height:350px; padding:24px; border:none; resize:none; font-family:'Plus Jakarta Sans',sans-serif; font-size:16px; line-height:1.6; color:var(--ink); outline:none; }
.text-area:focus { background:rgba(248,247,244,0.3); }

/* Action Buttons */
.action-bar { padding:16px 24px; border-top:1px solid var(--border); background:var(--bg); display:flex; flex-wrap:wrap; gap:12px; justify-content:space-between; align-items:center; }
.btn-group { display:flex; flex-wrap:wrap; gap:8px; }
.btn-case { background:var(--white); color:var(--ink-2); font-size:13px; font-weight:600; padding:10px 16px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:all .2s; }
.btn-case:hover { border-color:var(--ink); color:var(--ink); }

.btn-primary { background:var(--success); color:#fff; font-size:13px; font-weight:700; padding:10px 20px; border:none; border-radius:8px; cursor:pointer; transition:0.2s; display:flex; align-items:center; gap:6px; }
.btn-primary:hover { background:#236e3d; }
.btn-clear { background:transparent; color:var(--red); font-size:13px; font-weight:600; border:none; cursor:pointer; padding:10px; }
.btn-clear:hover { text-decoration:underline; }

.toast { position:fixed; bottom:28px; right:28px; background:var(--ink); color:#fff; padding:12px 20px; border-radius:10px; font-size:14px; opacity:0; transform:translateY(80px); transition:all .3s ease; z-index: 1000; }
.toast.show { transform:translateY(0); opacity:1; }

@media(max-width:768px){ nav { padding:0 20px;} .nav-links{display:none;} .main{padding:0 20px 80px;} .stats-bar {flex-wrap:wrap;} .stat-box {flex-grow:1;} }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><img src="favicon.ico" alt="Convertkaro"></div>
    <div class="logo-name">Convertkaro<span>.in</span></div>
  </a>
  <ul class="nav-links"><li><a href="index.html#tools">All Tools</a></li></ul>
</nav>

<div class="breadcrumb"><a href="index.html">Home</a> › <strong>Text Tools</strong></div>

<div class="page-hero">
  <div class="tool-icon-big">📝</div>
  <div>
    <h1 class="page-title">Case Converter <span class="serif">& Counter</span></h1>
    <p class="page-sub">Easily format text to uppercase, lowercase, or Title Case and count your words.</p>
  </div>
</div>

<div class="main">
  
  <div class="stats-bar">
    <div class="stat-box">
      <div class="stat-num" id="wordCount">0</div>
      <div class="stat-label">Words</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="charCount">0</div>
      <div class="stat-label">Characters</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="lineCount">0</div>
      <div class="stat-label">Lines</div>
    </div>
  </div>

  <div class="editor-panel">
    <textarea class="text-area" id="mainText" placeholder="Paste or type your text here..." oninput="analyzeText()"></textarea>
    
    <div class="action-bar">
      <div class="btn-group">
        <button class="btn-case" onclick="changeCase('upper')">UPPERCASE</button>
        <button class="btn-case" onclick="changeCase('lower')">lowercase</button>
        <button class="btn-case" onclick="changeCase('title')">Title Case</button>
        <button class="btn-case" onclick="changeCase('sentence')">Sentence case</button>
      </div>
      
      <div class="btn-group">
        <button class="btn-clear" onclick="clearText()">✕ Clear</button>
        <button class="btn-primary" onclick="copyText()">📋 Copy Text</button>
      </div>
    </div>
  </div>

</div>

<script>
const textArea = document.getElementById('mainText');

function analyzeText() {
  const text = textArea.value;
  
  // Characters
  document.getElementById('charCount').textContent = text.length;
  
  // Words
  const words = text.trim().split(/\s+/).filter(word => word.length > 0);
  document.getElementById('wordCount').textContent = words.length;
  
  // Lines
  const lines = text.length === 0 ? 0 : text.split(/\r\n|\r|\n/).length;
  document.getElementById('lineCount').textContent = lines;
}

function changeCase(type) {
  let text = textArea.value;
  if(!text) return;

  if(type === 'upper') {
    text = text.toUpperCase();
  } 
  else if(type === 'lower') {
    text = text.toLowerCase();
  } 
  else if(type === 'title') {
    text = text.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
  } 
  else if(type === 'sentence') {
    text = text.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase());
  }

  textArea.value = text;
  analyzeText(); // Re-run analysis just in case
  showToast(type + " applied!");
}

function clearText() {
  textArea.value = "";
  analyzeText();
}

function copyText() {
  if(!textArea.value) return showToast("Nothing to copy!");
  navigator.clipboard.writeText(textArea.value).then(() => {
    showToast("Copied to clipboard!");
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
